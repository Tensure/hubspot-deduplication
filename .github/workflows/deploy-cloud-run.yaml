name: Deploy Cloud Run Job

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (leave empty to deploy latest)'
        required: false
        type: string

env:
  IMAGE_HOST: us-east1-docker.pkg.dev
  IMAGE_REPO: tensure-shared-535f/tensure-docker-repo
  IMAGE_NAME: hubspot-deduplication
  GCP_PROJECT: hubspot-jobs-f297
  REGION: us-east1
  JOB_NAME: hubspot-dedup-job

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Resolve deploy tag
        id: tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const manualTag = (context.payload.inputs?.tag || '').trim();
            if (manualTag) {
              core.info(`Using manually provided tag: ${manualTag}`);
              core.setOutput('tag', manualTag);
              return;
            }

            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const latest = tags.find(t => /^v\d+\.\d+\.\d+$/.test(t.name));
            if (!latest) {
              core.setFailed('No semantic v* tags found in repository. Provide a tag input.');
              return;
            }

            core.info(`No tag provided. Using latest origin tag: ${latest.name}`);
            core.setOutput('tag', latest.name);

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run Job
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_HOST}/${IMAGE_REPO}/${IMAGE_NAME}:${TAG}"
          gcloud run jobs deploy "${JOB_NAME}" \
            --project "hubspot-jobs-f297" \
            --region "${REGION}" \
            --image "${IMAGE}" \
            --quiet
