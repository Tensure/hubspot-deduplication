name: Publish Container Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing git tag to publish, for example v1.2.3
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: Git tag to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_LOCATION: us-east1
  GAR_REGISTRY: us-east1-docker.pkg.dev
  GAR_REPOSITORY_PATH: tensure-shared-535f/tensure-docker-repo
  IMAGE_NAME: hubspot-deduplication

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate GAR settings
        run: |
          set -euo pipefail
          for value in GAR_LOCATION GAR_REGISTRY GAR_REPOSITORY_PATH IMAGE_NAME; do
            if [[ -z "${!value}" ]]; then
              echo "Missing required workflow setting: $value" >&2
              exit 1
            fi
          done

      - name: Verify tag is on main
        run: |
          set -euo pipefail
          git fetch origin refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker to use gcloud credentials
        run: |
          gcloud auth configure-docker "${GAR_REGISTRY}" --quiet

      - name: Set release tags
        id: release
        run: |
          set -euo pipefail
          echo "repository=${GAR_REGISTRY}/${GAR_REPOSITORY_PATH}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.release.outputs.repository }}:${{ steps.release.outputs.tag }}
            ${{ steps.release.outputs.repository }}:${{ steps.release.outputs.semver }}
            ${{ steps.release.outputs.repository }}:sha-${{ steps.release.outputs.sha_short }}
            ${{ steps.release.outputs.repository }}:latest
          cache-from: type=registry,ref=${{ steps.release.outputs.repository }}:latest
          cache-to: type=inline
          provenance: mode=max

      - name: Export SBOM from Artifact Registry
        env:
          IMAGE_URI: ${{ steps.release.outputs.repository }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          for attempt in {1..10}; do
            if output=$(gcloud artifacts sbom export --uri="${IMAGE_URI}" --location="${GAR_LOCATION}" 2>&1); then
              printf '%s\n' "$output"
              exit 0
            fi

            if [[ "$attempt" -eq 10 ]]; then
              printf '%s\n' "$output" >&2
              exit 1
            fi

            echo "SBOM export not ready yet for ${IMAGE_URI}; retrying"
            sleep $((attempt * 15))
          done
